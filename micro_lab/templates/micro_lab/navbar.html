<header class="navbar">
    <nav class="nav-links">
        <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
        <a href="{% url 'booking' %}" class="{% if request.resolver_match.url_name == 'booking' %}active{% endif %}">Booking</a>
        <a href="{% url 'all_slides' %}" class="{% if request.resolver_match.url_name == 'all_slides' %}active{% endif %}">Slides</a>
        
        {% if user.is_staff %}
            <a href="{% url 'dashboard' %}" 
            class="admin-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            Dashboard
            </a>
            <a href="{% url 'ai_dashboard' %}" class="{% if request.resolver_match.url_name == 'ai_dashboard' %}active{% endif %}">AI Dashboard</a>
            <a href="{% url 'labadmin' %}" 
            class="admin-link {% if request.resolver_match.url_name == 'labadmin' %}active{% endif %}">
            Admin
            </a>
        {% endif %}
    </nav>

    <div class="profile-section">
        {% if user.is_authenticated %}
            <span>Hello, {{ user.username }}</span>
            <form method="post" action="{% url 'logout' %}" style="display:inline; margin-left:15px;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </div>
</header>
