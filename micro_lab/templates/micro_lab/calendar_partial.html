<div id="calendar"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        if (calendarEl) {
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: '/api/calendar-events/',
                eventDisplay: 'block',
                eventOrder: 'order',
                displayEventTime: false, 

                // 🚀 วิธีที่ง่ายที่สุดในการทำตัวหนาเฉพาะส่วนหัว
                eventContent: function(arg) {
                    let title = arg.event.title;
                    // ใช้การ replace เพื่อครอบ <b> เฉพาะส่วนที่เป็น St.X:
                    let html = title.replace(/^(St\.\d+:)/, '<b>$1</b>');
                    
                    return { html: html };
                },

                eventDidMount: function(info) {
                    // ส่วนนี้เก็บไว้จัดการแค่เรื่องสีและขอบให้สวยงามเหมือนเดิม
                    var bgColor = info.event.backgroundColor;
                    var txtColor = info.event.textColor;
                    var bdColor = info.event.borderColor;

                    if (bgColor) {
                        info.el.style.setProperty('background-color', bgColor, 'important');
                        info.el.style.setProperty('color', txtColor, 'important');
                        info.el.style.setProperty('border-left', '5px solid ' + (bdColor || bgColor), 'important');
                    }
                    info.el.style.borderRadius = '4px';
                    info.el.style.marginBottom = '2px';
                    info.el.style.fontSize = '0.85em';
                }
            });
            calendar.render();
        }
    });
</script>
