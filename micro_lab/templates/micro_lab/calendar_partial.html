<div id="calendar"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');
        
        if (calendarEl) {
            var calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                events: '/api/calendar-events/',
                eventDisplay: 'block', // 🚀 ต้องมีบรรทัดนี้เพื่อให้แสดงเป็นแถบสี
                eventOrder: 'order',
                
                eventTimeFormat: {
                    hour: 'numeric',
                    minute: '2-digit',
                    meridiem: 'short',
                    hour12: true
                },
                
                eventDidMount: function(info) {
        // ดึงสีที่ส่งมาจาก common_data ใน views.py
        var bgColor = info.event.backgroundColor || info.event.extendedProps.color;
        var txtColor = info.event.textColor;
        var bdColor = info.event.borderColor;

        if (bgColor) {
            // บังคับเปลี่ยนสีที่ตัว Element โดยตรง (Inline Style)
            info.el.style.setProperty('background-color', bgColor, 'important');
            info.el.style.setProperty('border-color', bdColor || bgColor, 'important');
            info.el.style.setProperty('color', txtColor || '#000000', 'important');
            
            // เพิ่มเส้นขอบหนาด้านซ้ายเพื่อให้ดูเหมือนในรูปที่คุณต้องการ
            info.el.style.setProperty('border-left', '5px solid ' + (bdColor || bgColor), 'important');
        }
        
        info.el.style.borderRadius = '4px';
        info.el.style.marginBottom = '2px';
    }
});
            calendar.render();
        }
    });
</script>
